- name: Update packages
  dnf:
      name: "*"
      state: latest
      
- name: Install prerequisite packages
  dnf:
      name:
        # TPM tools
        - tpm2-tools
        - tpm2-tss
        - tss2
        - tpm2-tss-devel

        # Python pre-in
        - git
        - patch
        - python3
        - python3-devel
        - python3-setuptools
        - wget

        # Python dependencies
        - gcc
        - gcc-c++
        - openssl-devel
        - procps-ng
        - python3-alembic
        - python3-cryptography
        - python3-gnupg
        - python3-m2crypto
        - python3-packaging
        - python3-pip
        - python3-psutil
        - python3-pyyaml
        - python3-requests
        - python3-sqlalchemy
        - python3-tornado
        - python3-zmq
        - swig
        - yaml-cpp-devel

          # Build tools
        - autoconf
        - automake
        - autoconf-archive
        - doxygen
        - dbus-devel
        - gnulib-devel
        - json-c-devel
        - libgcrypt-devel
        - libstdc++-devel
        - libtool
        - libuuid-devel
        - m4
        - make 
        - libarchive-devel
        - openssl-devel
        - pkg-config 
        - uriparser-devel
        - libtpms 
        - gnutls-devel
        - gnutls-utils
        - gnutls
        - fuse-devel 
        - socat
        - expect
        - libtasn1-devel
    
        # Rust 
        - openssl-devel 
        - zeromq-devel
        - libarchive-devel 
        - cargo
        
      state: latest      
